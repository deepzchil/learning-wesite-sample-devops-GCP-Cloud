name: Enterprise CI/CD Static Website to Azure (MNC Standard)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# -------------------------------------------------
# GLOBAL VARIABLES
# -------------------------------------------------
env:
  AZURE_WEBAPP_NAME: indradeep
  NODE_VERSION: '24'
  PACKAGE_NAME: release.zip
  MANAGER_EMAIL: indradeep.ch12@gmail.com
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

# =================================================
# JOB 1 - BUILD + VALIDATION + CHANGE SUMMARY
# =================================================
  build:
    name: Build Website Package
    runs-on: ubuntu-latest
    outputs:
      commit_message: ${{ steps.commit.outputs.msg }}
      changed_files: ${{ steps.changes.outputs.files }}

    steps:
      # Checkout full repo for git diff
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Capture Commit Message
      - name: Read Commit Message
        id: commit
        run: |
          echo "msg=$(git log -1 --pretty=%B | tr '\n' ' ')" >> $GITHUB_OUTPUT

      # Capture Exact Changed Files
      - name: Detect Code Changes
        id: changes
        run: |
          echo "FILES_CHANGED<<EOF" >> $GITHUB_ENV
          git diff --name-only HEAD~1 HEAD >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Validate mandatory files
      - name: Validate Website Files
        run: |
          test -f index.html
          test -f css/style.css
          test -f js/script.js

      # Create deploy package
      - name: Archive Files
        run: zip -r ${{ env.PACKAGE_NAME }} ./*

      # Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: ${{ env.PACKAGE_NAME }}

# =================================================
# JOB 2 - EMAIL APPROVAL REQUEST WITH CHANGES
# =================================================
  approval-mail:
    name: Send Approval Email
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: Production Deployment Approval Required | ${{ github.repository }}

          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}

          html_body: |
            <html>
            <body style="font-family:Arial, Helvetica, sans-serif; color:#333333; line-height:1.6;">

            <h2 style="color:#0b5ed7;">Dear ${{ env.MANAGER_NAME }},</h2>

            <p>
              This is to inform you that the latest build for the project 
              <b>${{ github.repository }}</b> has been completed successfully and is now ready 
              for Production Deployment approval.
            </p>

            <p>
              As part of our controlled release process, your review and approval are required 
              before deployment can proceed to the production environment.
            </p>

            <hr>

            <h3 style="color:#0b5ed7;">Deployment Summary</h3>

            <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse; width:100%;">
              <tr>
                <td><b>Repository Name</b></td>
                <td>${{ github.repository }}</td>
              </tr>
              <tr>
                <td><b>Branch</b></td>
                <td>${{ github.ref_name }}</td>
              </tr>
              <tr>
                <td><b>Build Status</b></td>
                <td style="color:green;"><b>SUCCESS</b></td>
              </tr>
              <tr>
                <td><b>Triggered By</b></td>
                <td>${{ github.actor }}</td>
              </tr>
              <tr>
                <td><b>Commit ID</b></td>
                <td>${{ github.sha }}</td>
              </tr>
              <tr>
                <td><b>Commit Message</b></td>
                <td>${{ needs.build.outputs.commit_message }}</td>
              </tr>
              <tr>
                <td><b>Deployment Environment</b></td>
                <td>Production</td>
              </tr>
            </table>

            <br>

            <h3 style="color:#0b5ed7;">Code Changes Included in this Release</h3>

            <p>
              Please review the exact files modified as part of this deployment package:
            </p>

            <pre style="
              background:#f4f4f4;
              padding:12px;
              border:1px solid #dddddd;
              border-radius:5px;
              font-size:14px;">${{ needs.build.outputs.changed_files }}</pre>

            <h3 style="color:#0b5ed7;">Impact Assessment</h3>

            <ul>
              <li>Latest approved source code from <b>${{ github.ref_name }}</b> branch is packaged.</li>
              <li>Mandatory website files validated successfully.</li>
              <li>Deployment artifact created and stored securely.</li>
              <li>No production changes will occur until approval is granted.</li>
            </ul>

            <h3 style="color:#0b5ed7;">Approval Required</h3>

            <p>
              Kindly review the above changes and approve the production deployment by following:
            </p>

            <ol>
              <li>Open GitHub Repository</li>
              <li>Navigate to <b>Actions</b></li>
              <li>Select the latest workflow run</li>
              <li>Click <b>Review Deployments</b></li>
              <li>Select <b>Approve and Deploy</b></li>
            </ol>

            <h3 style="color:#0b5ed7;">Production URL</h3>

            <p>
              <a href="https://indradeep.azurewebsites.net">
                https://indradeep.azurewebsites.net
              </a>
            </p>

            <hr>

            <p>
              Please let us know if any further clarification is required before approval.
            </p>

            <br>

            <p>
              Regards,<br>
              <b>DevOps Automation Team</b><br>
              CI/CD Release Pipeline
            </p>

            </body>
            </html>

# =================================================
# JOB 3 - MANUAL APPROVAL
# =================================================
  approval:
    name: Production Approval
    needs: approval-mail
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://indradeep.azurewebsites.net

    steps:
      - run: echo "Waiting for manager approval..."

# =================================================
# JOB 4 - DEPLOY TO AZURE
# =================================================
  deploy:
    name: Deploy to Azure Production
    needs: approval
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: ./artifact

      - name: Extract Artifact
        run: |
          cd artifact
          unzip -o release.zip

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Website
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./artifact

      - name: Azure Logout
        run: az logout

# =================================================
# JOB 5 - POST DEPLOYMENT EMAIL
# =================================================
  success-mail:
    name: Send Success Email
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: Production Deployment Successful | ${{ github.repository }}

          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}

          body: |
            Dear ${{ env.MANAGER_NAME }},

            Production deployment completed successfully.

            Website URL:
            https://indradeep.azurewebsites.net

            Regards,
            DevOps Automation Team
