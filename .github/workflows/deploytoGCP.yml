name: CI/CD Static Website to GCP (Approval Flow)

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: githubaction-deploy-staticcode
  REGION: us-central1
  SERVICE_NAME: mywebsite
  NODE_VERSION: '24'
  PACKAGE_NAME: release.zip
  MANAGER_EMAIL: yourmanager@email.com
  MANAGER_NAME: Manager

permissions:
  contents: read
  id-token: write

jobs:

# -------------------------------------------------
# JOB 1 - BUILD
# -------------------------------------------------
  build:
    runs-on: ubuntu-latest

    outputs:
      changed_files: ${{ steps.diff.outputs.changed_files }}
      commit_message: ${{ steps.commit.outputs.commit_message }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Read Commit Message
        id: commit
        run: |
          echo "commit_message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Detect Changed Files
        id: diff
        run: |
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate Required Files
        run: |
          test -f index.html
          test -f css/style.css
          test -f js/script.js

      - name: Zip Build Package
        run: zip -r ${{ env.PACKAGE_NAME }} index.html css js

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: ${{ env.PACKAGE_NAME }}

# -------------------------------------------------
# JOB 2 - EMAIL APPROVAL REQUEST
# -------------------------------------------------
  approval-mail:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Approval Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Production Deployment Approval Required
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: |
            <h2>Dear ${{ env.MANAGER_NAME }}</h2>
            <p>Build completed successfully and approval is required.</p>
            <p><b>Commit:</b> ${{ needs.build.outputs.commit_message }}</p>
            <pre>${{ needs.build.outputs.changed_files }}</pre>

# -------------------------------------------------
# JOB 3 - MANUAL APPROVAL
# -------------------------------------------------
  approval:
    needs: approval-mail
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://mywebsite-759899501179.us-central1.run.app/

    steps:
      - run: echo "Waiting for approval"

# -------------------------------------------------
# JOB 4 - DEPLOY TO GCP CLOUD RUN
# -------------------------------------------------
  deploy:
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/759899501179/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@githubaction-deploy-staticcode.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM nginx:alpine
          COPY . /usr/share/nginx/html
          RUN sed -i 's/listen       80;/listen 8080;/g' /etc/nginx/conf.d/default.conf
          EXPOSE 8080
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Build Docker Image
        run: docker build -t us-docker.pkg.dev/${{ env.PROJECT_ID }}/myrepo/${{ env.SERVICE_NAME }} .

      - name: Push Docker Image
        run: docker push us-docker.pkg.dev/${{ env.PROJECT_ID }}/myrepo/${{ env.SERVICE_NAME }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image us-docker.pkg.dev/${{ env.PROJECT_ID }}/myrepo/${{ env.SERVICE_NAME }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated

# -------------------------------------------------
# JOB 5 - SUCCESS EMAIL
# -------------------------------------------------
  success-mail:
    needs: [deploy, build]
    runs-on: ubuntu-latest

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Production Deployment Successful
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: |
            <h2>Deployment Successful</h2>
            <p>Dear ${{ env.MANAGER_NAME }}</p>
            <p>Production deployment completed successfully.</p>
            <p><b>URL:</b> https://mywebsite-759899501179.us-central1.run.app/</p>